<div id="sdc-extension-settings" class="sdc-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b><i class="fa-solid fa-palette"></i> Palette Talk</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="sdc_settings_card">
                <div class="sdc_settings_intro">
                    Automatically colors dialogue quotes from each character's avatar. Set a color source per character &amp; persona, override individual colors in the character editor, or color "Send As" NPCs by name below.
                </div>
                <div id="sdc-char_dialogue_settings" class="sdc-extension_block dc-flex-container dc-color-settings-group">
                    <div class="sdc_settings_section_head">
                        <label for="sdc-char_dialogue_settings_header" title="Dialogue color settings for characters.">
                            <h4 id="sdc-char_dialogue_settings_header" name="sdc-char_dialogue_settings_header" class="sdc_settings_heading">
                                Character Dialogue Settings<span class="margin5 fa-solid fa-circle-info opacity50p"></span>
                            </h4>
                        </label>
                    </div>
                    <!-- 'Color Source Dropdown' created dynamically here -->
                    <div class="sdc_set_row">
                        <label for="sdc-char_static_color" title="The static color to use for character dialogue if 'Color Source' is set to 'Static Color'.">
                            Static Color<span class="margin5 fa-solid fa-circle-info opacity50p"></span>
                        </label>
                        <!-- 'Static Color Picker Combo' created dynamically here -->
                    </div>
                    <!-- 'Color Name Text Checkbox' created dynamically here -->
                    <!-- 'Boost Vibrancy Checkbox' created dynamically here -->
                </div>
                <div id="sdc-persona_dialogue_settings" class="sdc-extension_block dc-flex-container dc-color-settings-group">
                    <div class="sdc_settings_section_head">
                        <label for="sdc-persona_dialogue_settings_header" title="Dialogue color settings for user personas.">
                            <h4 id="sdc-persona_dialogue_settings_header" name="sdc-persona_dialogue_settings_header" class="sdc_settings_heading">
                                Persona Dialogue Settings<span class="margin5 fa-solid fa-circle-info opacity50p"></span>
                            </h4>
                        </label>
                    </div>
                    <!-- 'Color Source Dropdown' created dynamically here -->
                    <div class="sdc_set_row">
                        <label for="sdc-persona_static_color" title="The static color to use for persona dialogue if 'Color Source' is set to 'Static Color'.">
                            Static Color<span class="margin5 fa-solid fa-circle-info opacity50p"></span>
                        </label>
                        <!-- 'Static Color Picker Combo' created dynamically here -->
                    </div>
                    <!-- 'Color Name Text Checkbox' created dynamically here -->
                    <!-- 'Boost Vibrancy Checkbox' created dynamically here -->
                </div>
            </div>
        </div>
    </div>
</div>
